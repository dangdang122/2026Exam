<body>
<h3>회원가입</h3>
<form action="member" method="post">
    <p>: <span th:text="${member.id}"/></p>
    <p>: <span th:text="${member.passwd}"/></p>
    <p>: <span th:text="${member.city}"/></p>

    <p><span th:text="${member.id}"/></p>
</form>
